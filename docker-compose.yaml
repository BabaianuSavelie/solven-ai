networks:
  solven:
    driver: bridge

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    networks:
      - solven
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./openclaw:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:18789/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=dev
      - OPENCLAW_WS_URL=ws://openclaw:18789
    networks:
      - solven
    depends_on:
      openclaw:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "82:80"
    networks:
      - solven
    depends_on:
      - backend
